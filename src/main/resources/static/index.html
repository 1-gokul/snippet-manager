<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnipVault — Developer Code Snippet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #5dfc8d;
    --accent2: #3b82f6;
    --warn: #f97316;
    --text: #e8ecf4;
    --muted: #6b7694;
    --tag-bg: #1e2333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; font-weight: 700;
    color: #0d0f14;
  }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d0f14;
  }
  .btn-primary:hover { background: #4edb7a; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* LAYOUT */
  .app { display: flex; flex: 1; height: calc(100vh - 65px); }

  /* SIDEBAR */
  aside {
    width: 240px;
    min-width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    display: flex; flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-section { padding: 0 16px; margin-bottom: 24px; }
  .sidebar-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 0 16px 20px;
  }
  .search-box svg { color: var(--muted); flex-shrink: 0; }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 0.82rem; width: 100%;
  }
  .search-box input::placeholder { color: var(--muted); }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
    transition: all 0.12s;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(93,252,141,0.08); color: var(--accent); }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto;
    background: var(--surface2);
    border-radius: 20px;
    padding: 1px 7px;
    font-size: 0.68rem;
    color: var(--muted);
  }

  .tag-list { display: flex; flex-direction: column; gap: 2px; }
  .tag-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--muted);
    transition: all 0.12s;
  }
  .tag-item:hover { background: var(--surface2); color: var(--text); }
  .tag-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* MAIN CONTENT */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .toolbar-title { font-size: 1rem; font-weight: 700; flex: 1; }
  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }

  .snippets-grid {
    flex: 1; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 20px 24px;
    align-content: start;
  }

  /* SNIPPET CARD */
  .snippet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex; flex-direction: column;
  }
  .snippet-card:hover {
    border-color: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .snippet-card.pinned { border-color: rgba(93,252,141,0.3); }

  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 16px 16px 12px;
    gap: 10px;
  }
  .card-title { font-size: 0.9rem; font-weight: 700; line-height: 1.3; }
  .card-desc { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

  .lang-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; font-weight: 600;
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .code-preview {
    margin: 0 12px 12px;
    background: var(--bg);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.71rem;
    color: #a8b4d4;
    line-height: 1.7;
    overflow: hidden;
    max-height: 110px;
    position: relative;
  }
  .code-preview::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 32px;
    background: linear-gradient(transparent, var(--bg));
  }

  .card-footer {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tag {
    font-size: 0.65rem; font-weight: 600;
    background: var(--tag-bg);
    color: var(--muted);
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .card-date { margin-left: auto; font-size: 0.65rem; color: var(--muted); }

  .card-actions {
    display: flex; gap: 4px;
    opacity: 0; transition: opacity 0.15s;
  }
  .snippet-card:hover .card-actions { opacity: 1; }
  .icon-btn {
    background: var(--surface2);
    border: none;
    border-radius: 6px;
    padding: 5px 7px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.12s;
    font-size: 0.75rem;
    display: flex; align-items: center;
  }
  .icon-btn:hover { background: var(--border); color: var(--text); }
  .icon-btn.copied { color: var(--accent); }

  /* MODAL */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: min(680px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 0.75rem; font-weight: 600;
    color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent2);
  }
  .form-textarea {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    resize: vertical; min-height: 180px;
    line-height: 1.7;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 20px; padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; color: var(--muted); text-align: center;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 0.82rem; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent);
    color: #0d0f14;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.82rem;
    padding: 10px 18px;
    border-radius: 10px;
    z-index: 500;
    opacity: 0; transform: translateY(10px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* DETAIL PANEL */
  .detail-panel {
    width: 0; min-width: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.25s ease;
    display: flex; flex-direction: column;
  }
  .detail-panel.open {
    width: 400px; min-width: 400px;
    overflow-y: auto;
  }
  .detail-inner { padding: 24px; min-width: 400px; }
  .detail-lang-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 12px;
  }
  .detail-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; }
  .detail-desc { font-size: 0.82rem; color: var(--muted); margin-bottom: 18px; }
  .detail-code {
    background: var(--bg);
    border-radius: 10px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: #a8b4d4;
    line-height: 1.8;
    white-space: pre;
    overflow-x: auto;
    margin-bottom: 16px;
  }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Syntax colors */
  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .cm { color: #546e7a; }
  .num { color: #f78c6c; }
  .cls { color: #ffcb6b; }

  @media (max-width: 768px) {
    aside { display: none; }
    .snippets-grid { grid-template-columns: 1fr; }
    .detail-panel.open { width: 100%; min-width: unset; position: fixed; inset: 0; z-index: 150; overflow-y: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">{;}</div>
    SnipVault
  </div>
  <div class="header-actions">
    <span style="font-size:0.78rem;color:var(--muted);font-family:'JetBrains Mono',monospace" id="snippet-count-header"></span>
    <button class="btn btn-primary" onclick="openAddModal()">+ New Snippet</button>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside>
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search snippets..." id="search-input" oninput="filterSnippets()">
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Library</div>
      <div class="nav-item active" onclick="setFilter('all', this)">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        All Snippets
        <span class="nav-badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" onclick="setFilter('pinned', this)">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Pinned
        <span class="nav-badge" id="badge-pinned">0</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Languages</div>
      <div id="lang-nav"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div class="tag-list" id="tags-nav"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="toolbar">
      <span class="toolbar-title" id="section-title">All Snippets</span>
      <select class="sort-select" onchange="sortSnippets(this.value)">
        <option value="recent">Most Recent</option>
        <option value="alpha">A → Z</option>
        <option value="lang">By Language</option>
      </select>
    </div>
    <div class="snippets-grid" id="snippets-grid"></div>
  </main>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-inner" id="detail-inner"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">New Snippet</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="form-input" id="f-title" placeholder="e.g. Binary Search">
      </div>
      <div class="form-group">
        <label class="form-label">Language *</label>
        <select class="form-select" id="f-lang">
          <option>Java</option><option>JavaScript</option><option>Python</option>
          <option>C++</option><option>TypeScript</option><option>SQL</option>
          <option>Groovy</option><option>Bash</option><option>HTML</option><option>CSS</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="f-desc" placeholder="What does this snippet do?">
    </div>
    <div class="form-group">
      <label class="form-label">Code *</label>
      <textarea class="form-textarea" id="f-code" placeholder="Paste your code here..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Tags (comma-separated)</label>
      <input class="form-input" id="f-tags" placeholder="e.g. algorithm, sorting, interview">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSnippet()">Save Snippet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LANG_COLORS = {
  Java: { bg: '#1a2233', color: '#f97316' },
  JavaScript: { bg: '#1e2210', color: '#eab308' },
  Python: { bg: '#1a2210', color: '#22c55e' },
  'C++': { bg: '#1a1022', color: '#a78bfa' },
  TypeScript: { bg: '#101a2a', color: '#3b82f6' },
  SQL: { bg: '#1a1015', color: '#ec4899' },
  Groovy: { bg: '#0a1a1a', color: '#06b6d4' },
  Bash: { bg: '#0d1a10', color: '#4ade80' },
  HTML: { bg: '#1a1210', color: '#fb923c' },
  CSS: { bg: '#101522', color: '#818cf8' },
};
const TAG_COLORS = ['#5dfc8d','#3b82f6','#f97316','#a78bfa','#ec4899','#06b6d4'];

let snippets = [
  { id: 1, title: 'Spring Boot REST Controller', lang: 'Java', desc: 'Basic REST controller with CRUD endpoints', code: `@RestController\n@RequestMapping("/api/snippets")\npublic class SnippetController {\n\n  @Autowired\n  private SnippetService service;\n\n  @GetMapping\n  public List<Snippet> getAll() {\n    return service.findAll();\n  }\n\n  @PostMapping\n  public Snippet create(@RequestBody Snippet s) {\n    return service.save(s);\n  }\n}`, tags: ['spring', 'rest', 'java'], pinned: true, date: '2025-04-12' },
  { id: 2, title: 'Binary Search', lang: 'Java', desc: 'Iterative binary search on sorted array', code: `public int binarySearch(int[] arr, int target) {\n  int lo = 0, hi = arr.length - 1;\n  while (lo <= hi) {\n    int mid = lo + (hi - lo) / 2;\n    if (arr[mid] == target) return mid;\n    else if (arr[mid] < target) lo = mid + 1;\n    else hi = mid - 1;\n  }\n  return -1;\n}`, tags: ['algorithm', 'search', 'interview'], pinned: false, date: '2025-04-15' },
  { id: 3, title: 'JPA Repository Save', lang: 'Java', desc: 'Save entity using Spring Data JPA', code: `@Repository\npublic interface SnippetRepo\n    extends JpaRepository<Snippet, Long> {\n  List<Snippet> findByTagsContaining(String tag);\n  List<Snippet> findByLanguage(String lang);\n}`, tags: ['jpa', 'spring', 'mysql'], pinned: false, date: '2025-05-01' },
  { id: 4, title: 'Python List Comprehension', lang: 'Python', desc: 'Common list comprehension patterns', code: `# Filter and transform\nresult = [x**2 for x in range(10) if x % 2 == 0]\n\n# Nested comprehension (flatten)\nflat = [n for row in matrix for n in row]\n\n# Dict comprehension\nsquares = {x: x**2 for x in range(5)}`, tags: ['python', 'basics'], pinned: true, date: '2025-03-20' },
  { id: 5, title: 'SQL Bulk Insert', lang: 'SQL', desc: 'Insert multiple rows efficiently', code: `INSERT INTO code_snippets\n  (title, language, code, created_at)\nVALUES\n  ('Binary Search', 'Java', '...', NOW()),\n  ('Merge Sort',    'Java', '...', NOW()),\n  ('REST API',      'Java', '...', NOW());`, tags: ['sql', 'mysql', 'performance'], pinned: false, date: '2025-04-22' },
  { id: 6, title: 'Debounce Function', lang: 'JavaScript', desc: 'Delay function execution until idle', code: `function debounce(fn, delay = 300) {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), delay);\n  };\n}\n\n// Usage\nconst search = debounce(query => fetchResults(query), 400);`, tags: ['utility', 'performance', 'js'], pinned: false, date: '2025-05-10' },
];

let editId = null;
let activeFilter = 'all';
let activeFilterValue = null;
let sortMode = 'recent';
let searchQuery = '';
let openSnippetId = null;

function getLangStyle(lang) {
  return LANG_COLORS[lang] || { bg: '#1a1e2a', color: '#6b7694' };
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getFiltered() {
  let list = [...snippets];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(s => s.title.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.tags.some(t => t.includes(q)) || s.lang.toLowerCase().includes(q));
  }
  if (activeFilter === 'pinned') list = list.filter(s => s.pinned);
  if (activeFilter === 'lang') list = list.filter(s => s.lang === activeFilterValue);
  if (activeFilter === 'tag') list = list.filter(s => s.tags.includes(activeFilterValue));
  if (sortMode === 'alpha') list.sort((a,b) => a.title.localeCompare(b.title));
  else if (sortMode === 'lang') list.sort((a,b) => a.lang.localeCompare(b.lang));
  else list.sort((a,b) => new Date(b.date) - new Date(a.date));
  return list;
}

function render() {
  const grid = document.getElementById('snippets-grid');
  const list = getFiltered();
  document.getElementById('snippet-count-header').textContent = `${snippets.length} snippets`;

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No snippets found</h3><p>Try a different search or add a new snippet.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(s => {
    const ls = getLangStyle(s.lang);
    return `<div class="snippet-card${s.pinned?' pinned':''}" onclick="openDetail(${s.id})">
      <div class="card-header">
        <div>
          <div class="card-title">${escHtml(s.title)}</div>
          ${s.desc ? `<div class="card-desc">${escHtml(s.desc)}</div>` : ''}
        </div>
        <span class="lang-badge" style="background:${ls.bg};color:${ls.color}">${s.lang}</span>
      </div>
      <div class="code-preview">${escHtml(s.code)}</div>
      <div class="card-footer">
        ${s.pinned ? '<span class="tag" style="color:#5dfc8d">★ pinned</span>' : ''}
        ${s.tags.slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('')}
        <span class="card-date">${formatDate(s.date)}</span>
        <div class="card-actions">
          <button class="icon-btn" title="Copy" onclick="copySnippet(event,${s.id})">⎘</button>
          <button class="icon-btn" title="Edit" onclick="editSnippet(event,${s.id})">✎</button>
          <button class="icon-btn" title="Pin" onclick="togglePin(event,${s.id})">${s.pinned?'★':'☆'}</button>
          <button class="icon-btn" title="Delete" onclick="deleteSnippet(event,${s.id})" style="color:#f97316">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');

  updateSidebar();
}

function updateSidebar() {
  document.getElementById('badge-all').textContent = snippets.length;
  document.getElementById('badge-pinned').textContent = snippets.filter(s=>s.pinned).length;

  const langs = [...new Set(snippets.map(s=>s.lang))];
  document.getElementById('lang-nav').innerHTML = langs.map(l => {
    const ls = getLangStyle(l);
    const cnt = snippets.filter(s=>s.lang===l).length;
    return `<div class="nav-item" onclick="setFilter('lang',this,'${l}')" style="color:${ls.color}">
      <span style="width:7px;height:7px;border-radius:50%;background:${ls.color};display:inline-block;flex-shrink:0"></span>
      ${l} <span class="nav-badge">${cnt}</span></div>`;
  }).join('');

  const allTags = [...new Set(snippets.flatMap(s=>s.tags))];
  document.getElementById('tags-nav').innerHTML = allTags.map((t,i) => {
    const c = TAG_COLORS[i % TAG_COLORS.length];
    return `<div class="tag-item" onclick="setFilter('tag',this,'${t}')">
      <span class="tag-dot" style="background:${c}"></span>#${t}</div>`;
  }).join('');
}

function openDetail(id) {
  const s = snippets.find(x=>x.id===id);
  if (!s) return;
  openSnippetId = id;
  const ls = getLangStyle(s.lang);
  document.getElementById('detail-inner').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <span class="detail-lang-badge" style="background:${ls.bg};color:${ls.color}">${s.lang}</span>
      <button class="icon-btn" onclick="closeDetail()" title="Close" style="opacity:0.6">✕</button>
    </div>
    <div class="detail-title">${escHtml(s.title)}</div>
    <div class="detail-desc">${escHtml(s.desc||'No description')}</div>
    <div class="detail-code">${escHtml(s.code)}</div>
    <div class="detail-tags">${s.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    <div style="font-size:0.72rem;color:var(--muted);margin-bottom:16px">Added ${formatDate(s.date)}</div>
    <div class="detail-actions">
      <button class="btn btn-primary" onclick="copyCode(${id})">⎘ Copy Code</button>
      <button class="btn btn-ghost" onclick="editSnippet(event,${id})">✎ Edit</button>
      <button class="btn btn-ghost" onclick="togglePin(event,${id})">${s.pinned?'★ Unpin':'☆ Pin'}</button>
    </div>`;
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  openSnippetId = null;
}

function openAddModal() {
  editId = null;
  document.getElementById('modal-title').textContent = 'New Snippet';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-code').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-lang').value = 'Java';
  document.getElementById('modal-overlay').classList.add('open');
}

function editSnippet(e, id) {
  e.stopPropagation();
  const s = snippets.find(x=>x.id===id);
  editId = id;
  document.getElementById('modal-title').textContent = 'Edit Snippet';
  document.getElementById('f-title').value = s.title;
  document.getElementById('f-desc').value = s.desc;
  document.getElementById('f-code').value = s.code;
  document.getElementById('f-tags').value = s.tags.join(', ');
  document.getElementById('f-lang').value = s.lang;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveSnippet() {
  const title = document.getElementById('f-title').value.trim();
  const code = document.getElementById('f-code').value.trim();
  if (!title || !code) { showToast('Title and code are required!'); return; }
  const snippet = {
    id: editId || Date.now(),
    title,
    lang: document.getElementById('f-lang').value,
    desc: document.getElementById('f-desc').value.trim(),
    code,
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean),
    pinned: editId ? snippets.find(s=>s.id===editId).pinned : false,
    date: new Date().toISOString().split('T')[0],
  };
  if (editId) {
    snippets = snippets.map(s => s.id===editId ? snippet : s);
    showToast('Snippet updated!');
    if (openSnippetId === editId) openDetail(editId);
  } else {
    snippets.unshift(snippet);
    showToast('Snippet saved!');
  }
  document.getElementById('modal-overlay').classList.remove('open');
  render();
}

function deleteSnippet(e, id) {
  e.stopPropagation();
  snippets = snippets.filter(s=>s.id!==id);
  if (openSnippetId === id) closeDetail();
  showToast('Snippet deleted');
  render();
}

function togglePin(e, id) {
  e.stopPropagation();
  snippets = snippets.map(s => s.id===id ? {...s, pinned: !s.pinned} : s);
  if (openSnippetId === id) openDetail(id);
  render();
}

function copySnippet(e, id) {
  e.stopPropagation();
  const s = snippets.find(x=>x.id===id);
  navigator.clipboard.writeText(s.code).then(()=>showToast('Copied to clipboard!'));
}

function copyCode(id) {
  const s = snippets.find(x=>x.id===id);
  navigator.clipboard.writeText(s.code).then(()=>showToast('Copied to clipboard!'));
}

function setFilter(type, el, value) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if (el) el.classList.add('active');
  activeFilter = type;
  activeFilterValue = value || null;
  const titles = { all: 'All Snippets', pinned: 'Pinned Snippets', lang: value, tag: `#${value}` };
  document.getElementById('section-title').textContent = titles[type] || value;
  closeDetail();
  render();
}

function filterSnippets() {
  searchQuery = document.getElementById('search-input').value;
  render();
}

function sortSnippets(val) { sortMode = val; render(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modal-overlay').classList.remove('open');
    closeDetail();
  }
  if ((e.metaKey||e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

render();
</script>
</body>
</html>
